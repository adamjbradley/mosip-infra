name: Backup Master Sheet from OneDrive

on:
  schedule:
    - cron: '0 2 * * *'  # Runs daily at 2:00 AM UTC. Edit as needed (e.g., '0 0 * * 1' for weekly on Mondays).
  workflow_dispatch:  # Allows manual triggering from the Actions tab.

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Microsoft 365
        uses: pnp/action-cli-login@v3.0.1
        with:
          APP_ID: ${{ secrets.APP_ID }}
          CERTIFICATE_ENCODED: ${{ secrets.CERTIFICATE_ENCODED }}
          TENANT: ${{ secrets.TENANT_ID }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}  # If needed

      - name: Download Master_Testcases.xlsx
        uses: pnp/action-cli-runscript@v3.0.0
        with:
          CLI_MICROSOFT365_SCRIPT: |
            m365 spo file get \
            --webUrl "https://cyberpwn-my.sharepoint.com/personal/ragini_cyberpwn_com" \
            --url "/personal/ragini_cyberpwn_com/Documents/Master_Testcases.xlsx" \
            --outputFilePath "./Master_Testcases.xlsx"

      - name: Ensure target folder exists
        run: mkdir -p MasterTestcases

      - name: Move file to target folder
        run: mv ./Master_Testcases.xlsx ./MasterTestcases/Master_Testcases.xlsx

      - name: Configure Git
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Action"

      - name: Commit and push changes
        run: |
          git add MasterTestcases/Master_Testcases.xlsx
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Backup: Update Master_Testcases.xlsx - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
