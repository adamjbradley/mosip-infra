---
# Kernel services — api-internal.mosip.localhost/v1/<service>
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-internal-kernel
  namespace: kernel
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
spec:
  ingressClassName: nginx
  rules:
    - host: api-internal.mosip.localhost
      http:
        paths:
          - path: /v1/authmanager
            pathType: Prefix
            backend: { service: { name: authmanager, port: { number: 80 } } }
          - path: /v1/auditmanager
            pathType: Prefix
            backend: { service: { name: auditmanager, port: { number: 80 } } }
          - path: /v1/masterdata
            pathType: Prefix
            backend: { service: { name: masterdata, port: { number: 80 } } }
          - path: /v1/syncdata
            pathType: Prefix
            backend: { service: { name: syncdata, port: { number: 80 } } }
          - path: /v1/otpmanager
            pathType: Prefix
            backend: { service: { name: otpmanager, port: { number: 80 } } }
          - path: /v1/pridgenerator
            pathType: Prefix
            backend: { service: { name: pridgenerator, port: { number: 80 } } }
          - path: /v1/ridgenerator
            pathType: Prefix
            backend: { service: { name: ridgenerator, port: { number: 80 } } }
          - path: /v1/idgenerator
            pathType: Prefix
            backend: { service: { name: idgenerator, port: { number: 80 } } }
          - path: /v1/notifier
            pathType: Prefix
            backend: { service: { name: notifier, port: { number: 80 } } }
---
